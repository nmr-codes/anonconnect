version: "1"

services:
  # The FastAPI Backend
  - type: web
    name: anonconnect-backend
    env: docker
    dockerContext: backend
    dockerfilePath: backend/Dockerfile
    region: ohio
    plan: free
    envVars:
      - key: DATABASE_URL
        fromDatabase:
          name: anonconnect-db
          property: connectionString
      - key: REDIS_URL
        fromService:
          type: redis
          name: anonconnect-redis
          property: connectionString
      - key: JWT_SECRET
        generateValue: true
      - key: FRONTEND_URL
        value: "https://anonconnect-alpha.vercel.app"
      - key: DEBUG
        value: "False"

databases:
  # Managed PostgreSQL Database
  - name: anonconnect-db
    region: ohio
    plan: free

  # Managed Redis Instance
  - type: redis
    name: anonconnect-redis
    region: ohio
    plan: free
    ipAllowList: [] # empty means only internal access
